steps:
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - >-
        --destination=${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${SHORT_SHA}
      - >-
        --destination=${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:latest
      - '--dockerfile=n8n/Dockerfile.n8n'
      - '--context=dir://.'
      - '--cache=true'
      - '--cache-ttl=24h'
    id: build-and-push-custom-image
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - run
      - deploy
      - n8n-automation
      - '--image'
      - >-
        ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${SHORT_SHA}
      - '--region'
      - ${_LOCATION}
      - '--ingress'
      - internal-and-cloud-load-balancing
      - '--no-allow-unauthenticated'
      - '--service-account'
      - n8n-runner@${PROJECT_ID}.iam.gserviceaccount.com
    id: deploy-to-cloud-run
    waitFor:
      - build-and-push-custom-image
    entrypoint: gcloud
options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: '200'
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _REPO_NAME: _REPO_NAME
  _IMAGE_NAME: _IMAGE_NAME
  _LOCATION: _LOCATION
